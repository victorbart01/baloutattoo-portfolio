<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="white"/>
  <!-- Mandala soleil — triangles rayonnants -->
  <g transform="translate(250,250)" fill="none" stroke="#111" stroke-width="0.8">
    <!-- Centre -->
    <circle cx="0" cy="0" r="15" fill="#111"/>
    <circle cx="0" cy="0" r="28"/>
    <circle cx="0" cy="0" r="40"/>
    <!-- 12 rayons triangulaires internes -->
    <g fill="#111" stroke="none">
      <path d="M0,-42 L7,-70 L-7,-70 Z"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(30)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(60)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(90)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(120)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(150)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(180)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(210)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(240)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(270)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(300)"/>
      <path d="M0,-42 L7,-70 L-7,-70 Z" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="75"/>
    <!-- Étoile à 12 branches -->
    <g fill="#111" stroke="none">
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(15)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(45)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(75)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(105)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(135)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(165)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(195)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(225)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(255)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(285)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(315)"/>
      <path d="M0,-78 L10,-100 L0,-122 L-10,-100 Z" transform="rotate(345)"/>
    </g>
    <!-- Cercle entre branches -->
    <g>
      <circle cx="0" cy="-95" r="8"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(30)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(60)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(90)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(120)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(150)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(180)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(210)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(240)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(270)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(300)"/>
      <circle cx="0" cy="-95" r="8" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="130"/>
    <!-- Grands rayons triangulaires externes -->
    <g fill="#111" stroke="none">
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(30)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(60)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(90)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(120)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(150)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(180)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(210)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(240)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(270)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(300)"/>
      <path d="M0,-133 L16,-165 L0,-200 L-16,-165 Z" transform="rotate(330)"/>
    </g>
  </g>
</svg>

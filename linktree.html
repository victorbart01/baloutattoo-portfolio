<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balou Tattoo — Liens</title>
  <meta name="description" content="Balou — Tatoueur Mandala & Ornamental. Paris · Thaïlande. Booking ouvert." />
  <link rel="canonical" href="https://baloutattoo.ink/linktree.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0a0a0a;
      --dark:   #111111;
      --dark2:  #1a1a1a;
      --border: #2a2a2a;
      --muted:  #555555;
      --light:  #aaaaaa;
      --white:  #f0ede8;
      --accent: #c9a96e;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'Inter', system-ui, sans-serif;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font-sans);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* Fond avec motif mandala subtil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(201,169,110,0.06) 0%, transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(201,169,110,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      overflow: hidden;
      margin-bottom: 1.4rem;
      background: var(--dark2);
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(15%);
    }
    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* Nom */
    .lt-name {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--white);
      margin-bottom: 0.3rem;
    }
    .lt-name em {
      font-style: italic;
      color: var(--accent);
    }

    .lt-handle {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .lt-tagline {
      font-size: 0.82rem;
      color: var(--light);
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 2.4rem;
    }

    /* Divider */
    .lt-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin-bottom: 2.4rem;
    }

    /* Liens */
    .lt-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .lt-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.4rem;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--white);
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.22s, background 0.22s, transform 0.15s;
      cursor: pointer;
    }

    .lt-link:hover {
      border-color: var(--accent);
      background: rgba(201,169,110,0.06);
      transform: translateY(-1px);
    }

    .lt-link.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
      font-weight: 400;
    }
    .lt-link.primary:hover {
      background: #d4b47a;
      border-color: #d4b47a;
    }

    .lt-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      width: 22px;
      text-align: center;
    }

    .lt-label {
      flex: 1;
    }

    .lt-arrow {
      color: var(--muted);
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .lt-link:hover .lt-arrow,
    .lt-link.primary .lt-arrow {
      color: inherit;
    }

    /* Footer */
    .lt-footer {
      margin-top: 3rem;
      text-align: center;
    }
    .lt-footer p {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .lt-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 520px) {
      body { padding: 2rem 1rem; }
      .lt-name { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <img src="images/balou-portrait.jpg" alt="Balou Tattoo"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="avatar-placeholder" style="display:none">B</div>
    </div>

    <!-- Identité -->
    <h1 class="lt-name">Balou <em>Tattoo</em></h1>
    <p class="lt-handle">@balou_tattoo.ink</p>
    <p class="lt-tagline">Mandala · Ornamental · Grand Format<br />Paris &amp; Thaïlande · Booking ouvert</p>

    <div class="lt-divider"></div>

    <!-- Liens -->
    <nav class="lt-links">

      <!-- BOOKING — lien principal -->
      <a class="lt-link primary" href="https://baloutattoo.ink#booking">
        <span class="lt-icon">✏️</span>
        <span class="lt-label">Réserver une séance</span>
        <span class="lt-arrow">→</span>
      </a>

      <!-- Portfolio -->
      <a class="lt-link" href="https://baloutattoo.ink">
        <span class="lt-icon">🖼</span>
        <span class="lt-label">Portfolio &amp; Galerie</span>
        <span class="lt-arrow">→</span>
      </a>

      <!-- Instagram -->
      <a class="lt-link" href="https://www.instagram.com/balou_tattoo.ink/" target="_blank" rel="noopener">
        <span class="lt-icon">📸</span>
        <span class="lt-label">Instagram — 41K followers</span>
        <span class="lt-arrow">→</span>
      </a>

      <!-- Devis -->
      <a class="lt-link" href="https://baloutattoo.ink/devis.html">
        <span class="lt-icon">💬</span>
        <span class="lt-label">Demander un devis</span>
        <span class="lt-arrow">→</span>
      </a>

      <!-- Cal.com — À activer quand compte créé -->
      <!-- <a class="lt-link" href="https://cal.com/baloutattoo" target="_blank" rel="noopener">
        <span class="lt-icon">📅</span>
        <span class="lt-label">Choisir un créneau</span>
        <span class="lt-arrow">→</span>
      </a> -->

    </nav>

    <!-- Signature -->
    <footer class="lt-footer">
      <p>Paris · Thaïlande · <a href="https://baloutattoo.ink">baloutattoo.ink</a></p>
    </footer>

  </div>

</body>
</html>

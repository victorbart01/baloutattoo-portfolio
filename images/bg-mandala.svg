<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <g transform="translate(170,170)" fill="none" stroke="#111" opacity="0.09">

    <!-- ======= FLEUR DE VIE ======= -->
    <!-- r = 50 pour chaque cercle     -->

    <!-- 7 cercles du cœur (centre + 6) -->
    <circle cx="0"      cy="0"     r="50" stroke-width="0.65"/>
    <circle cx="0"      cy="-50"   r="50" stroke-width="0.65"/>
    <circle cx="43.3"   cy="-25"   r="50" stroke-width="0.65"/>
    <circle cx="43.3"   cy="25"    r="50" stroke-width="0.65"/>
    <circle cx="0"      cy="50"    r="50" stroke-width="0.65"/>
    <circle cx="-43.3"  cy="25"    r="50" stroke-width="0.65"/>
    <circle cx="-43.3"  cy="-25"   r="50" stroke-width="0.65"/>

    <!-- Anneau extérieur — 12 cercles (2e couronne) -->
    <!-- 6 alignés sur les axes -->
    <circle cx="0"      cy="-100"  r="50" stroke-width="0.4"/>
    <circle cx="86.6"   cy="-50"   r="50" stroke-width="0.4"/>
    <circle cx="86.6"   cy="50"    r="50" stroke-width="0.4"/>
    <circle cx="0"      cy="100"   r="50" stroke-width="0.4"/>
    <circle cx="-86.6"  cy="50"    r="50" stroke-width="0.4"/>
    <circle cx="-86.6"  cy="-50"   r="50" stroke-width="0.4"/>
    <!-- 6 en intercalé -->
    <circle cx="50"     cy="-86.6" r="50" stroke-width="0.4"/>
    <circle cx="100"    cy="0"     r="50" stroke-width="0.4"/>
    <circle cx="50"     cy="86.6"  r="50" stroke-width="0.4"/>
    <circle cx="-50"    cy="86.6"  r="50" stroke-width="0.4"/>
    <circle cx="-100"   cy="0"     r="50" stroke-width="0.4"/>
    <circle cx="-50"    cy="-86.6" r="50" stroke-width="0.4"/>

    <!-- Cercle englobant décoratif -->
    <circle cx="0" cy="0" r="105" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="113" stroke-width="0.25" stroke-dasharray="2,4"/>

    <!-- 6 points aux sommets -->
    <circle cx="0"      cy="-114" r="2.5" fill="#111" stroke="none"/>
    <circle cx="98.7"   cy="-57"  r="2.5" fill="#111" stroke="none"/>
    <circle cx="98.7"   cy="57"   r="2.5" fill="#111" stroke="none"/>
    <circle cx="0"      cy="114"  r="2.5" fill="#111" stroke="none"/>
    <circle cx="-98.7"  cy="57"   r="2.5" fill="#111" stroke="none"/>
    <circle cx="-98.7"  cy="-57"  r="2.5" fill="#111" stroke="none"/>

    <!-- Point central -->
    <circle cx="0" cy="0" r="3" fill="#111" stroke="none"/>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="white"/>
  <!-- Bracelet / Band ornamental — style manchette -->
  <g transform="translate(300,100)" fill="none" stroke="#111" stroke-width="0.8">
    <!-- Lignes horizontales du band -->
    <line x1="-280" y1="-40" x2="280" y2="-40" stroke-width="1"/>
    <line x1="-280" y1="-32" x2="280" y2="-32" stroke-width="0.5"/>
    <line x1="-280" y1="32" x2="280" y2="32" stroke-width="0.5"/>
    <line x1="-280" y1="40" x2="280" y2="40" stroke-width="1"/>
    <!-- Motif répété : losange + fleur -->
    <g id="unit">
      <!-- Losange central -->
      <path d="M0,-30 L18,0 L0,30 L-18,0 Z" stroke-width="0.7"/>
      <!-- Cercle inscrit -->
      <circle cx="0" cy="0" r="10"/>
      <circle cx="0" cy="0" r="4" fill="#111" stroke="none"/>
      <!-- Points aux coins du losange -->
      <circle cx="0" cy="-30" r="2.5" fill="#111" stroke="none"/>
      <circle cx="18" cy="0" r="2.5" fill="#111" stroke="none"/>
      <circle cx="0" cy="30" r="2.5" fill="#111" stroke="none"/>
      <circle cx="-18" cy="0" r="2.5" fill="#111" stroke="none"/>
      <!-- Petites lignes décoratives -->
      <line x1="-18" y1="0" x2="-36" y2="0" stroke-width="0.5"/>
      <line x1="18" y1="0" x2="36" y2="0" stroke-width="0.5"/>
      <!-- Petites étoiles aux intersections -->
      <line x1="-28" y1="-8" x2="-28" y2="8" stroke-width="0.5"/>
      <line x1="-36" y1="-8" x2="-28" y2="0" stroke-width="0.5"/>
      <line x1="-36" y1="8" x2="-28" y2="0" stroke-width="0.5"/>
      <line x1="28" y1="-8" x2="28" y2="8" stroke-width="0.5"/>
      <line x1="36" y1="-8" x2="28" y2="0" stroke-width="0.5"/>
      <line x1="36" y1="8" x2="28" y2="0" stroke-width="0.5"/>
    </g>
    <!-- Répétition du motif le long du band -->
    <use href="#unit" transform="translate(-216,0)"/>
    <use href="#unit" transform="translate(-144,0)"/>
    <use href="#unit" transform="translate(-72,0)"/>
    <use href="#unit" transform="translate(0,0)"/>
    <use href="#unit" transform="translate(72,0)"/>
    <use href="#unit" transform="translate(144,0)"/>
    <use href="#unit" transform="translate(216,0)"/>
    <!-- Points entre les losanges (dotwork) -->
    <g fill="#111" stroke="none">
      <circle cx="-252" cy="-20" r="1.5"/>
      <circle cx="-252" cy="0" r="1.5"/>
      <circle cx="-252" cy="20" r="1.5"/>
      <circle cx="-180" cy="-20" r="1.5"/>
      <circle cx="-180" cy="0" r="1.5"/>
      <circle cx="-180" cy="20" r="1.5"/>
      <circle cx="-108" cy="-20" r="1.5"/>
      <circle cx="-108" cy="0" r="1.5"/>
      <circle cx="-108" cy="20" r="1.5"/>
      <circle cx="-36" cy="-20" r="1.5"/>
      <circle cx="-36" cy="0" r="1.5"/>
      <circle cx="-36" cy="20" r="1.5"/>
      <circle cx="36" cy="-20" r="1.5"/>
      <circle cx="36" cy="0" r="1.5"/>
      <circle cx="36" cy="20" r="1.5"/>
      <circle cx="108" cy="-20" r="1.5"/>
      <circle cx="108" cy="0" r="1.5"/>
      <circle cx="108" cy="20" r="1.5"/>
      <circle cx="180" cy="-20" r="1.5"/>
      <circle cx="180" cy="0" r="1.5"/>
      <circle cx="180" cy="20" r="1.5"/>
      <circle cx="252" cy="-20" r="1.5"/>
      <circle cx="252" cy="0" r="1.5"/>
      <circle cx="252" cy="20" r="1.5"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="white"/>
  <!-- Mandala ornamental — style fin line avec arabesques -->
  <g transform="translate(250,250)" fill="none" stroke="#111" stroke-width="0.7">
    <!-- Noyau -->
    <circle cx="0" cy="0" r="8" fill="#111"/>
    <circle cx="0" cy="0" r="16"/>
    <!-- Étoile à 8 branches interne -->
    <g fill="#111" stroke="none">
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(45)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(90)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(135)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(180)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(225)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(270)"/>
      <path d="M0,-18 L4,-28 L0,-38 L-4,-28 Z" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="44"/>
    <!-- Motifs floraux internes -->
    <g>
      <!-- Fleur : 4 cercles -->
      <circle cx="0" cy="-55" r="12"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(45)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(90)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(135)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(180)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(225)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(270)"/>
      <circle cx="0" cy="-55" r="12" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="68"/>
    <!-- Lignes courbes arabesques -->
    <g stroke-width="0.6">
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(45)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(90)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(135)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(180)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(225)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(270)"/>
      <path d="M0,-70 Q20,-90 0,-110 Q-20,-90 0,-70" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="118"/>
    <!-- 8 ornements en feuilles -->
    <g>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(45)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(90)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(135)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(180)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(225)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(270)"/>
      <path d="M0,-120 C12,-138 12,-152 0,-168 C-12,-152 -12,-138 0,-120Z" stroke-width="0.8" transform="rotate(315)"/>
    </g>
    <!-- Points entre les feuilles -->
    <g fill="#111" stroke="none">
      <circle cx="0" cy="-142" r="3" transform="rotate(22.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(67.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(112.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(157.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(202.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(247.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(292.5)"/>
      <circle cx="0" cy="-142" r="3" transform="rotate(337.5)"/>
    </g>
    <circle cx="0" cy="0" r="178"/>
    <!-- Couronne de petites fleurs -->
    <g>
      <circle cx="0" cy="-190" r="6"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(22.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(45)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(67.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(90)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(112.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(135)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(157.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(180)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(202.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(225)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(247.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(270)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(292.5)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(315)"/>
      <circle cx="0" cy="-190" r="6" transform="rotate(337.5)"/>
    </g>
    <circle cx="0" cy="0" r="200" stroke-width="1.2"/>
  </g>
</svg>
